name: Sync contributors

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}
      OWNER: gohugo-ananke

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch contributor source files
        shell: bash
        run: |
          set -euo pipefail

          : "${GH_TOKEN:?GH_TOKEN is required}"

          rm -rf data/contributors
          mkdir -p data/contributors

          repos=(
            ".github"
            "ananke"
            "ananke-asylum"
            "documentation"
            "gohugo-ananke.github.io"
            "hugofixer"
            "template-git-submod"
            "template-hugo-mod"
          )

          fetched_count=0

          for repo in "${repos[@]}"; do
            echo "Fetching .all-contributorsrc from ${OWNER}/${repo}"

            if ! content=$(gh api \
              --method GET \
              "repos/${OWNER}/${repo}/contents/.all-contributorsrc" \
              --jq '.content' \
              2>/dev/null); then
              echo "::warning::No .all-contributorsrc found in ${OWNER}/${repo}; skipping."
              continue
            fi

            printf '%s' "${content}" \
              | tr -d '\n' \
              | base64 --decode \
              > "data/contributors/${repo}.json"

            fetched_count=$((fetched_count + 1))
          done

          if [ "${fetched_count}" -eq 0 ]; then
            echo "::error::No contributor source files were fetched."
            exit 1
          fi

      - name: Generate central contributors page
        run: npm run contributors:merge

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- data/contributors content/information/contributors.md; then
            echo "No contributor changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/contributors content/information/contributors.md
          git commit -m "docs(contributors): sync aggregated contributors"
          git push
