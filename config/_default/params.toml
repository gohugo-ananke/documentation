description = "Documentation for the Hugo Ananke theme."

[ananke]
show_recent_posts = false
custom_css = ["fonts.css", "docs-theme.css", "fixes.css", "highlighting.css"]

[ananke.home]
content_alignment = "left" # options: left, center, right

[ananke.shortcodes.since]
# printf format string for the `since` shortcode's release link; %s is the
# version. Without this the badge renders as plain text with no link.
repo_url = "https://github.com/gohugo-ananke/ananke/releases/tag/v%s"

[ananke.shortcodes.edit_page]
# Base URL of the repository that holds this documentation. The "edit-page"
# shortcode/hook builds GitHub /edit/ links from it; visitors without write
# access are automatically offered GitHub's fork-and-propose-changes flow.
repo_url = "https://github.com/gohugo-ananke/documentation"
# Edits target the development branch of the documentation site.
branch = "development"
# content_dir defaults to "content" and matches this repository's layout.

[ananke.pages]
show_date = false

[ananke.social.follow]
networks = ["mastodon"]

[ananke.social.mastodon]
profilelink = "https://mastodon.social/@ananke_theme"
username = "ananke_theme"

[ananke.hooks]
verbosity = "debug" # debug, info, warning, error
